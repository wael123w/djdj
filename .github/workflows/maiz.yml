name: Extract ZIP

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip alfaore-store.zip -d alfaore-store

      - name: Upload extracted files
        uses: actions/upload-artifact@v4
        with:
          name: alfaore-store-files
          path: alfaore-store
